name: Continuous Delivery Pipeline

on:
  workflow_run:
    workflows: ["CI/CD Pipeline with Antigravity Agent"]
    branches: ["main"]
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-push-docker:
    name: Build & Push Docker Image to GHCR
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}

      - name: Upload K8s Manifests Artifact
        uses: actions/upload-artifact@v4
        with:
          name: k8s-manifests
          path: k8s/

  build-and-package-site:
    name: Build & Package Site
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Upload GitHub Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy-production:
    name: Deploy to GitHub Pages
    needs: build-and-package-site
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  deploy-kubernetes-cluster:
    name: Deploy Microservice to Kubernetes Cluster
    needs: build-and-push-docker
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    env:
      KUBECONFIG: ${{ secrets.KUBECONFIG }}
    steps:
      - name: Checkout Code
        if: env.KUBECONFIG != ''
        uses: actions/checkout@v4

      - name: Set Kubernetes Context
        if: env.KUBECONFIG != ''
        uses: azure/k8s-set-context@v4
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBECONFIG }}

      - name: Deploy Kubernetes Manifests
        if: env.KUBECONFIG != ''
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml
          kubectl apply -f k8s/ingress.yaml

      - name: Verify Kubernetes Rollout Status
        if: env.KUBECONFIG != ''
        run: |
          kubectl rollout status deployment/calculator-deployment -n ci-cd-demo --timeout=120s
          kubectl get pods,svc,ingress -n ci-cd-demo -o wide

