name: Continuous Delivery Pipeline

on:
  workflow_run:
    workflows: ["CI/CD Pipeline with Antigravity Agent"]
    branches: ["main"]
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-push-docker:
    name: Build & Push Docker Image to GHCR
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Lowercase Repository Name
        id: repo
        run: echo "repo=${GITHUB_REPOSITORY,,}" >> $GITHUB_OUTPUT

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ghcr.io/${{ steps.repo.outputs.repo }}:latest
            ghcr.io/${{ steps.repo.outputs.repo }}:${{ github.sha }}

      - name: Upload K8s Manifests Artifact
        uses: actions/upload-artifact@v4
        with:
          name: k8s-manifests
          path: k8s/

  build-and-package-site:
    name: Build & Package Site
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Upload GitHub Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy-production:
    name: Deploy to GitHub Pages
    needs: build-and-package-site
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  deploy-kubernetes-cluster:
    name: Deploy Microservice to Kubernetes Cluster
    needs: build-and-push-docker
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup & Normalize Kubernetes Kubeconfig
        id: kubeconfig
        run: |
          mkdir -p ~/.kube
          python3 -c '
          import os, sys, base64, json

          raw = os.environ.get("RAW_KUBECONFIG", "").strip()
          github_output = os.environ.get("GITHUB_OUTPUT")

          def write_output(key, val):
              if github_output:
                  with open(github_output, "a") as f:
                      f.write(f"{key}={val}\n")

          if not raw:
              write_output("IS_VALID", "false")
              print("::notice::No KUBECONFIG secret provided in repository secrets. Skipping Kubernetes deployment.")
              sys.exit(0)

          if (raw.startswith("\"") and raw.endswith("\"")) or (raw.startswith("'") and raw.endswith("'")):
              raw = raw[1:-1].strip()

          try:
              decoded = base64.b64decode(raw).decode("utf-8")
              if "apiVersion" in decoded or "kind" in decoded:
                  raw = decoded
          except Exception:
              pass

          if raw.startswith("\"") or raw.startswith("{"):
              try:
                  parsed = json.loads(raw)
                  if isinstance(parsed, str):
                      raw = parsed
              except Exception:
                  pass

          if "apiVersion" not in raw or "clusters" not in raw:
              write_output("IS_VALID", "false")
              print("::notice::KUBECONFIG secret is missing valid apiVersion/clusters configuration. Skipping Kubernetes deployment.")
              sys.exit(0)

          kubeconfig_path = os.path.expanduser("~/.kube/config")
          with open(kubeconfig_path, "w") as f:
              f.write(raw + "\n")

          os.chmod(kubeconfig_path, 0o600)
          write_output("IS_VALID", "true")
          '
          if [ "${{ steps.kubeconfig.outputs.IS_VALID }}" = "true" ]; then
            echo "KUBECONFIG=$HOME/.kube/config" >> $GITHUB_ENV
          fi
        env:
          RAW_KUBECONFIG: ${{ secrets.KUBECONFIG }}

      - name: Deploy Kubernetes Manifests
        if: steps.kubeconfig.outputs.IS_VALID == 'true'
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml
          kubectl apply -f k8s/ingress.yaml

      - name: Verify Kubernetes Rollout Status
        if: steps.kubeconfig.outputs.IS_VALID == 'true'
        run: |
          kubectl rollout status deployment/calculator-deployment -n ci-cd-demo --timeout=120s
          kubectl get pods,svc,ingress -n ci-cd-demo -o wide

