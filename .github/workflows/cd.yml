name: Continuous Delivery Pipeline

# Trigger conditions: Runs after the CI pipeline completes on 'main' branch or when manually launched via workflow_dispatch
on:
  workflow_run:
    workflows: ["CI/CD Pipeline with Antigravity Agent"]
    branches: ["main"]
    types:
      - completed
  workflow_dispatch:

# Minimum GitHub token permissions required to read code, write container packages, and publish to GitHub Pages
permissions:
  contents: read
  packages: write
  pages: write
  id-token: write

# Prevent simultaneous deployments by queuing concurrent pipeline runs under the "cd-pipeline" group
concurrency:
  group: "cd-pipeline"
  cancel-in-progress: false

jobs:
  # ==========================================
  # STAGE 0: GitHub Pages Deployment (Automated Live Public URL in GUI)
  # ==========================================
  build-and-package-site:
    name: Build & Package Site
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Upload GitHub Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy-production:
    name: Deploy to GitHub Pages (Live Automated Web App)
    needs: build-and-package-site
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Output Stage 0 Endpoint Summary
        run: |
          echo "======================================================="
          echo "🌐 STAGE 0 DEPLOYMENT ENDPOINT:"
          echo "Live Web App URL: ${{ steps.deployment.outputs.page_url }}"
          echo "======================================================="
          echo "### 🌐 Stage 0 Live GitHub Pages Endpoint" >> $GITHUB_STEP_SUMMARY
          echo "- **Live Web App URL**: ${{ steps.deployment.outputs.page_url }}" >> $GITHUB_STEP_SUMMARY

  # ==========================================
  # STAGE 1: Standalone Docker Deployment (:3000)
  # ==========================================
  cd-1-docker-deployment:
    name: "Stage 1: Standalone Docker Deployment (Port 3000)"
    needs: deploy-production # Sequential dependency: Stage 1 runs after GitHub Pages deployment finishes successfully
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      # Step 1: Clone the repository source code onto the GitHub runner VM
      - name: Checkout Code
        uses: actions/checkout@v4

      # Step 2: Authenticate with GitHub Container Registry (ghcr.io) using the built-in GITHUB_TOKEN secret
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Step 3: Initialize Docker Buildx to enable multi-platform container image builds and advanced caching
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Step 4: Convert repository name to lowercase (Docker image tag names must be lowercase according to OCI specs)
      - name: Lowercase Repository Name
        id: repo
        run: echo "repo=${GITHUB_REPOSITORY,,}" >> $GITHUB_OUTPUT

      # Step 5: Build the Docker container image from ./Dockerfile and push it to ghcr.io with 'latest' and commit SHA tags
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ghcr.io/${{ steps.repo.outputs.repo }}:latest
            ghcr.io/${{ steps.repo.outputs.repo }}:${{ github.sha }}

      # Step 6: Test the container locally on the runner by starting it in detached mode (-d) on port 3000 and running curl health checks
      - name: Run Standalone Docker Container locally on port 3000
        run: |
          docker run -d -p 3000:3000 --name standalone-calc ghcr.io/${{ steps.repo.outputs.repo }}:latest
          sleep 3
          docker ps
          curl -f http://127.0.0.1:3000/
          curl -f http://127.0.0.1:3000/api/cluster/info

      # Step 7: Output endpoint URL to GitHub Actions Job Summary and Console Logs
      - name: Output Stage 1 Endpoint Summary
        run: |
          echo "======================================================="
          echo "🚀 STAGE 1 DEPLOYMENT ENDPOINTS:"
          echo "Standalone Docker URL: http://127.0.0.1:3000/"
          echo "API Cluster Info Endpoint: http://127.0.0.1:3000/api/cluster/info"
          echo "======================================================="
          echo "### 🚀 Stage 1 Deployment Endpoint" >> $GITHUB_STEP_SUMMARY
          echo "- **Standalone Docker Container URL**: \`http://127.0.0.1:3000/\`" >> $GITHUB_STEP_SUMMARY
          echo "- **API Cluster Info Endpoint**: \`http://127.0.0.1:3000/api/cluster/info\`" >> $GITHUB_STEP_SUMMARY

  # ==========================================
  # STAGE 2: KinD Kubernetes Deployment (:8080)
  # ==========================================
  cd-2-kind-deployment:
    name: "Stage 2: KinD Kubernetes Microservice Deployment (Port 8080)"
    needs: cd-1-docker-deployment # Sequential dependency: Stage 2 runs only after Stage 1 finishes successfully
    runs-on: ubuntu-latest
    steps:
      # Step 1: Clone repository source code on the new runner VM to access Kubernetes manifest files in k8s/
      - name: Checkout Code
        uses: actions/checkout@v4

      # Step 2: Convert repository name to lowercase for referencing the image tag on ghcr.io
      - name: Lowercase Repository Name
        id: repo
        run: echo "repo=${GITHUB_REPOSITORY,,}" >> $GITHUB_OUTPUT

      # Step 3: Authenticate with GitHub Container Registry (ghcr.io) on this fresh VM runner
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Step 4: Spin up a local ephemeral Kubernetes-in-Docker (KinD) cluster named 'ci-cd-demo-cluster'
      - name: Create Ephemeral KinD Kubernetes Cluster
        uses: helm/kind-action@v1.12.0
        with:
          cluster_name: ci-cd-demo-cluster
          wait: 120s

      # Step 5: Pull the application Docker image from ghcr.io and import/load it directly into the KinD cluster node
      - name: Pull and Load Docker Image into KinD Cluster
        run: |
          docker pull ghcr.io/${{ steps.repo.outputs.repo }}:latest
          kind load docker-image ghcr.io/${{ steps.repo.outputs.repo }}:latest --name ci-cd-demo-cluster

      # Step 6: Apply all Kubernetes declarative YAML manifests (Namespace, Deployment, Service, Ingress) onto the cluster
      - name: Apply Kubernetes Manifests
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml
          kubectl apply -f k8s/ingress.yaml

      # Step 7: Wait for all application pods to reach Running status and display active cluster resources
      - name: Verify Kubernetes Rollout Status
        run: |
          kubectl rollout status deployment/calculator-deployment -n ci-cd-demo --timeout=120s
          kubectl get pods,svc,ingress -n ci-cd-demo -o wide

      # Step 8: Forward Kubernetes Service to Port 8080 & Test Microservice
      - name: Forward Kubernetes Service to Port 8080 & Test Microservice
        run: |
          kubectl port-forward svc/calculator-service 8080:80 -n ci-cd-demo &
          sleep 5
          curl -f http://127.0.0.1:8080/
          curl -f http://127.0.0.1:8080/api/cluster/info

      # Step 9: Output endpoint URL to GitHub Actions Job Summary and Console Logs
      - name: Output Stage 2 Endpoint Summary
        run: |
          echo "======================================================="
          echo "☸️ STAGE 2 DEPLOYMENT ENDPOINTS:"
          echo "KinD Microservice Service URL: http://127.0.0.1:8080/"
          echo "K8s Microservice API Endpoint: http://127.0.0.1:8080/api/cluster/info"
          echo "======================================================="
          echo "### ☸️ Stage 2 Deployment Endpoint" >> $GITHUB_STEP_SUMMARY
          echo "- **KinD Microservice Service URL**: \`http://127.0.0.1:8080/\`" >> $GITHUB_STEP_SUMMARY
          echo "- **K8s Microservice API Endpoint**: \`http://127.0.0.1:8080/api/cluster/info\`" >> $GITHUB_STEP_SUMMARY

  # ==========================================
  # STAGE 3: Kubernetes Telemetry & Dashboard (:46723)
  # ==========================================
  cd-3-cluster-dashboard:
    name: "Stage 3: Kubernetes Telemetry & Dashboard (Port 46723)"
    needs: cd-2-kind-deployment # Sequential dependency: Stage 3 runs after Stage 2 finishes successfully
    runs-on: ubuntu-latest
    steps:
      # Step 1: Clone repository source code onto the new runner VM
      - name: Checkout Code
        uses: actions/checkout@v4

      # Step 2: Create a dedicated KinD cluster ('ci-cd-demo-telemetry') for monitoring and telemetry demonstration
      - name: Create Ephemeral KinD Kubernetes Cluster for Telemetry
        uses: helm/kind-action@v1.12.0
        with:
          cluster_name: ci-cd-demo-telemetry
          wait: 120s

      # Step 3: Install official Kubernetes Web UI Dashboard manifests into the 'kubernetes-dashboard' namespace
      - name: Deploy Kubernetes Dashboard
        run: |
          kubectl apply -f https://raw.githubusercontent.com/kubernetes/dashboard/v2.7.0/aio/deploy/recommended.yaml
          kubectl rollout status deployment/kubernetes-dashboard -n kubernetes-dashboard --timeout=120s || true

      # Step 4: Launch 'kubectl proxy' in the background to serve the Kubernetes Dashboard UI locally on port 46723
      - name: Expose Kubernetes Dashboard Proxy on Port 46723
        run: |
          kubectl proxy --port=46723 &
          sleep 3
          curl -s http://127.0.0.1:46723/api/v1/namespaces/kubernetes-dashboard/services/http:kubernetes-dashboard:/proxy/ || true

      # Step 5: Dump telemetry data (cluster pods, services, node statuses) to text files for auditing and reporting
      - name: Generate Telemetry Summary Artifact
        run: |
          mkdir -p telemetry_output
          kubectl get all -A > telemetry_output/cluster_resources.txt
          kubectl get nodes -o wide > telemetry_output/cluster_nodes.txt

      # Step 6: Upload cluster telemetry logs as a GitHub Actions build artifact ('k8s-telemetry-report') for student review
      - name: Upload Telemetry Report Artifact
        uses: actions/upload-artifact@v4
        with:
          name: k8s-telemetry-report
          path: telemetry_output/

      # Step 7: Output dashboard endpoint URL to GitHub Actions Job Summary and Console Logs
      - name: Output Stage 3 Telemetry Summary
        run: |
          echo "======================================================="
          echo "📊 STAGE 3 DEPLOYMENT ENDPOINT:"
          echo "Telemetry Dashboard URL: http://127.0.0.1:46723/api/v1/namespaces/kubernetes-dashboard/services/http:kubernetes-dashboard:/proxy/#/workloads?namespace=ci-cd-demo"
          echo "======================================================="
          echo "### 📊 Stage 3 Kubernetes Dashboard Endpoint" >> $GITHUB_STEP_SUMMARY
          echo "- **Telemetry Dashboard URL**: \`http://127.0.0.1:46723/api/v1/namespaces/kubernetes-dashboard/services/http:kubernetes-dashboard:/proxy/#/workloads?namespace=ci-cd-demo\`" >> $GITHUB_STEP_SUMMARY
