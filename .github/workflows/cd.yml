name: Continuous Delivery Pipeline

on:
  workflow_run:
    workflows: ["CI/CD Pipeline with Antigravity Agent"]
    branches: ["main"]
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  pages: write
  id-token: write

concurrency:
  group: "cd-pipeline"
  cancel-in-progress: false

jobs:
  # ==========================================
  # STAGE 1: Standalone Docker Deployment (:3000)
  # ==========================================
  cd-1-docker-deployment:
    name: "Stage 1: Standalone Docker Deployment (Port 3000)"
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Lowercase Repository Name
        id: repo
        run: echo "repo=${GITHUB_REPOSITORY,,}" >> $GITHUB_OUTPUT

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ghcr.io/${{ steps.repo.outputs.repo }}:latest
            ghcr.io/${{ steps.repo.outputs.repo }}:${{ github.sha }}

      - name: Run Standalone Docker Container locally on port 3000
        run: |
          docker run -d -p 3000:3000 --name standalone-calc ghcr.io/${{ steps.repo.outputs.repo }}:latest
          sleep 3
          docker ps
          curl -f http://127.0.0.1:3000/
          curl -f http://127.0.0.1:3000/api/cluster/info

  # ==========================================
  # GitHub Pages Deployment (Static Web Portal)
  # ==========================================
  build-and-package-site:
    name: Build & Package Site
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Upload GitHub Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy-production:
    name: Deploy to GitHub Pages
    needs: build-and-package-site
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # ==========================================
  # STAGE 2: KinD Kubernetes Deployment (:8080)
  # ==========================================
  cd-2-kind-deployment:
    name: "Stage 2: KinD Kubernetes Microservice Deployment (Port 8080)"
    needs: cd-1-docker-deployment
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Lowercase Repository Name
        id: repo
        run: echo "repo=${GITHUB_REPOSITORY,,}" >> $GITHUB_OUTPUT

      - name: Create Ephemeral KinD Kubernetes Cluster
        uses: helm/kind-action@v1.12.0
        with:
          cluster_name: ci-cd-demo-cluster
          wait: 120s

      - name: Pull and Load Docker Image into KinD Cluster
        run: |
          docker pull ghcr.io/${{ steps.repo.outputs.repo }}:latest
          kind load docker-image ghcr.io/${{ steps.repo.outputs.repo }}:latest --name ci-cd-demo-cluster

      - name: Apply Kubernetes Manifests
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml
          kubectl apply -f k8s/ingress.yaml

      - name: Verify Kubernetes Rollout Status
        run: |
          kubectl rollout status deployment/calculator-deployment -n ci-cd-demo --timeout=120s
          kubectl get pods,svc,ingress -n ci-cd-demo -o wide

      - name: Forward Kubernetes Service to Port 8080 & Test Microservice
        run: |
          kubectl port-forward svc/calculator-service 8080:80 -n ci-cd-demo &
          sleep 5
          curl -f http://127.0.0.1:8080/
          curl -f http://127.0.0.1:8080/api/cluster/info

  # ==========================================
  # STAGE 3: Kubernetes Telemetry & Dashboard (:46723)
  # ==========================================
  cd-3-cluster-dashboard:
    name: "Stage 3: Kubernetes Telemetry & Dashboard (Port 46723)"
    needs: cd-2-kind-deployment
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Create Ephemeral KinD Kubernetes Cluster for Telemetry
        uses: helm/kind-action@v1.12.0
        with:
          cluster_name: ci-cd-demo-telemetry
          wait: 120s

      - name: Deploy Kubernetes Dashboard
        run: |
          kubectl apply -f https://raw.githubusercontent.com/kubernetes/dashboard/v2.7.0/aio/deploy/recommended.yaml
          kubectl rollout status deployment/kubernetes-dashboard -n kubernetes-dashboard --timeout=120s || true

      - name: Expose Kubernetes Dashboard Proxy on Port 46723
        run: |
          kubectl proxy --port=46723 &
          sleep 3
          curl -s http://127.0.0.1:46723/api/v1/namespaces/kubernetes-dashboard/services/http:kubernetes-dashboard:/proxy/ || true

      - name: Generate Telemetry Summary Artifact
        run: |
          mkdir -p telemetry_output
          kubectl get all -A > telemetry_output/cluster_resources.txt
          kubectl get nodes -o wide > telemetry_output/cluster_nodes.txt

      - name: Upload Telemetry Report Artifact
        uses: actions/upload-artifact@v4
        with:
          name: k8s-telemetry-report
          path: telemetry_output/
